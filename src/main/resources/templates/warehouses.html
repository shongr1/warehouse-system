<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Warehouse Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#1a1d20; color: white; padding:40px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; margin-bottom: 30px; }

        table { border-collapse: separate; border-spacing: 0 8px; width: 100%; }
        th { background: rgba(255,255,255,0.1); color: #aaa; padding: 12px; text-align: left; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        td { padding: 15px; background: rgba(255,255,255,0.03); vertical-align: middle; border-top: 1px solid rgba(255,255,255,0.05); }
        tr:first-child td { border-top: none; }

        .link-name { text-decoration:none; color:#0dcaf0; font-weight:bold; }
        .btn-action { padding: 6px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; transition: 0.2s; }
        .btn-approve { background: #198754; color: white; border: none; }
        .btn-approve:hover { background: #157347; }

        .badge-pending { background: #ffc107; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-info">Warehouse Management</h2>
        <a class="btn btn-outline-light btn-sm" th:href="@{/ui}">← Back to Dashboard</a>
    </div>

    <div th:if="${incomingRequests != null and !#lists.isEmpty(incomingRequests)}" class="glass-card border-warning">
        <h5 class="text-warning mb-3 fw-bold">⚠️ Pending Return Requests (Incoming)</h5>
        <div class="table-responsive">
            <table>
                <thead>
                <tr>
                    <th>From Soldier</th>
                    <th>Item / SN</th>
                    <th>Note</th>
                    <th class="text-end">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${incomingRequests}">
                    <td th:text="${req.fromUser.fullName}">Israel Israeli</td>
                    <td>
                        <span th:text="${req.item.itemType.name}">Product</span>
                        <small class="text-info d-block" th:text="${req.item.serialNumber}">SN123</small>
                    </td>
                    <td th:text="${req.note}" class="small text-muted italic">Reason</td>
                    <td class="text-end">
                        <form th:action="@{/ui/transfers/{id}/approve(id=${req.id})}" method="post">
                            <button type="submit" class="btn-action btn-approve">Approve & Receive</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="glass-card text-white">
        <h5 class="mb-4">My Warehouses</h5>
        <div class="table-responsive">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Owner</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="w : ${warehouses}">
                    <td th:text="${w.id}" class="text-muted"></td>
                    <td>
                        <a class="link-name" th:href="@{/ui/warehouses/{id}(id=${w.id})}" th:text="${w.name}"></a>
                    </td>
                    <td th:text="${w.location}"></td>
                    <td th:text="${w.owner != null ? w.owner.fullName : '—'}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-info me-2" th:href="@{/ui/warehouses/{id}/add(id=${w.id})}">
                            Add Products
                        </a>
                        <a class="btn btn-sm btn-outline-light" th:href="@{/ui/warehouses/{id}(id=${w.id})}">
                            View Stock
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
