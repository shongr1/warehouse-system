<h5 class="mb-3">Create Item Type</h5>

<form method="post" th:action="@{/ui/item-types}" th:object="${createItemTypeForm}">
    <input type="hidden" name="warehouseId" th:value="${warehouse.id}"/>

    <div class="row g-3">

        <div class="col-12 col-lg-3">
            <label class="form-label">Catalog Number</label>
            <input class="form-control" th:field="*{catalogNumber}">
        </div>

        <div class="col-12 col-lg-3">
            <label class="form-label">Name</label>
            <input class="form-control" th:field="*{name}">
        </div>

        <div class="col-12 col-lg-2 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" th:field="*{serialized}">
                <label class="form-check-label">Serialized</label>
            </div>
        </div>

        <div class="col-12 col-lg-2 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="kitCheck" th:field="*{kit}">
                <label class="form-check-label">KIT</label>
            </div>
        </div>

    </div>

    <!-- KIT COMPONENTS -->
    <div id="kitComponentsBox" class="mt-4" style="display:none;">

        <div class="glass-card p-3">
            <div class="d-flex justify-content-between mb-2">
                <h6>Kit Components</h6>
                <button type="button" class="btn btn-sm btn-outline-light" onclick="addComponentRow()">+ Add</button>
            </div>

            <table class="table table-dark">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Sub Catalog</th>
                    <th>Qty</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="componentsTable"></tbody>
            </table>

        </div>
    </div>

    <div class="mt-3">
        <button class="btn btn-outline-light" type="submit">+ Create Item Type</button>
    </div>
</form>
<script>

    const kitCheck = document.getElementById("kitCheck");
    const kitBox = document.getElementById("kitComponentsBox");
    const table = document.getElementById("componentsTable");

    kitCheck.addEventListener("change", () => {
        kitBox.style.display = kitCheck.checked ? "" : "none";
    });

    function addComponentRow() {

        const index = table.children.length;

        const row = document.createElement("tr");

        row.innerHTML = `
            <td><input class="form-control" name="components[${index}].componentName"></td>
            <td><input class="form-control" name="components[${index}].subCatalogNumber"></td>
            <td><input type="number" min="1" class="form-control" name="components[${index}].quantity"></td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove()">X</button></td>
        `;

        table.appendChild(row);
    }

</script>
