<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Signed Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/dashboard.css}">
    <style>
        .action-input {
            max-width: 120px;
            background: rgba(255,255,255,0.1) !important;
            border-color: rgba(255,255,255,0.2) !important;
            color: white !important;
        }
        .action-input::placeholder { color: rgba(255,255,255,0.4); font-size: 0.75rem; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .badge-expiry { font-size: 0.75rem; padding: 5px 10px; }
        .table { --bs-table-bg: transparent; }
    </style>
</head>

<body class="dashboard-page text-white bg-dark">
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">My Signed Items</h2>
            <p class="text-muted small mb-0">ציוד שבאחריותך האישית ומעקב תוקף חתימה</p>
        </div>
        <a class="btn btn-outline-light" th:href="@{/ui}">← Back</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="glass-card p-4">
        <div th:if="${#lists.isEmpty(items)}" class="text-muted text-center py-4">
            No items are signed by you.
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(items)}">
            <table class="table table-dark table-hover align-middle">
                <thead>
                <tr>
                    <th>Item ID</th>
                    <th>Serial</th>
                    <th>Product</th>
                    <th>Warehouse</th>
                    <th>Status</th>
                    <th>Expiry</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="it : ${items}">
                    <td th:text="${it.id}">1</td>
                    <td th:text="${it.serialNumber}" class="fw-bold text-info">SN</td>
                    <td th:text="${it.itemTypeName}">Type</td>
                    <td th:text="${it.warehouseName}">WH</td>
                    <td>
                        <span th:class="${it.status == 'TRANSFER_PENDING'} ? 'badge bg-warning text-dark' : 'badge bg-secondary'"
                              th:text="${it.status}">SIGNED</span>
                    </td>

                    <td>
                        <div th:if="${it.signatureExpiryDate != null}">
                            <span th:if="${it.daysRemaining <= 0}" class="badge bg-danger badge-expiry">EXPIRED</span>
                            <span th:if="${it.daysRemaining > 0 and it.daysRemaining <= 30}" class="badge bg-warning text-dark badge-expiry">
                                <span th:text="${it.daysRemaining}"></span>d
                            </span>
                            <span th:if="${it.daysRemaining > 30}" class="badge bg-success badge-expiry">
                                <span th:text="${it.daysRemaining}"></span>d
                            </span>
                        </div>
                        <span th:if="${it.signatureExpiryDate == null}" class="text-muted small">—</span>
                    </td>

                    <td class="text-end">
                        <div class="d-flex gap-2 justify-content-end align-items-center" th:if="${it.status == 'SIGNED'}">

                            <form th:action="@{/ui/items/{id}/transfer-request(id=${it.id})}" method="post" class="d-flex gap-1" onsubmit="disableButton(this)">
                                <input type="text" name="toPersonalNumber"
                                       class="form-control form-control-sm action-input"
                                       placeholder="מ&quot;א מקבל" required>

                                <input type="hidden" name="quantity" value="1">
                                <input type="hidden" name="note" value="Handover from personal list">

                                <button class="btn btn-sm btn-outline-primary" type="submit">Transfer</button>
                            </form>

                            <form th:action="@{/ui/items/{id}/transfer-request(id=${it.id})}" method="post" onsubmit="disableButton(this)">
                                <input type="hidden" name="toPersonalNumber" th:value="${it.warehouseOwnerPn}">
                                <input type="hidden" name="quantity" value="1">
                                <input type="hidden" name="note" th:value="'זיכוי למחסן ' + ${it.warehouseName}">

                                <button class="btn btn-sm btn-warning" type="submit">Return</button>
                            </form>

                        </div>
                        <div th:if="${it.status == 'TRANSFER_PENDING'}" class="text-muted small italic">
                            Pending Approval...
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function disableButton(form) {
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
