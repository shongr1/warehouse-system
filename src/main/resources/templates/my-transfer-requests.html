<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>בקשות העברה נכנסות</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/dashboard.css}">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }
        .batch-header {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px 15px 0 0;
        }
        .table th { font-weight: 600; color: #888; }
        .btn-approve { background-color: #198754; color: white; }
        .btn-approve:hover { background-color: #157347; color: white; }
    </style>
</head>

<body class="dashboard-page bg-dark text-white">
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">בקשות העברה נכנסות</h2>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light px-4" th:href="@{/ui}"> חזור לתפריט ← </a>
        </div>
    </div>

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show text-end" role="alert">
        <strong>בוצע!</strong> הפעולה הושלמה בהצלחה.
        <button type="button" class="btn-close" data-bs-dismiss="alert" style="float: left; margin-left: -10px;"></button>
    </div>

    <div th:if="${#maps.isEmpty(groupedRequests)}" class="glass-card p-5 text-center text-white-50">
        <i class="bi bi-inbox-fill" style="font-size: 3rem; opacity: 0.3;"></i>
        <h4 class="mt-3 mb-2">אין בקשות ממתינות</h4>
        <p>כרגע אין פריטים שמחכים לאישור ההעברה שלך.</p>
    </div>

    <div th:each="entry : ${groupedRequests}" class="glass-card mb-5 overflow-hidden shadow-lg">

        <div class="batch-header p-4 d-flex justify-content-between align-items-center border-bottom border-secondary">
            <div class="text-end">
                <h4 class="text-info mb-1 fw-bold">
                    העברה מ: <span th:text="${entry.key}">שם השולח</span>
                </h4>
                <span class="badge bg-primary px-3 py-2" th:text="${entry.value.size() + ' פריטים בקבוצה'}">0 פריטים</span>
            </div>

            <div class="d-flex gap-3">
                <a th:href="@{/ui/transfer-requests/pdf(ids=${#strings.listJoin(entry.value.![id], ',')})}"
                   class="btn btn-info text-dark fw-bold d-flex align-items-center px-3 shadow-sm">
                    <i class="bi bi-printer-fill me-2"></i> הדפסת טופס העברה
                </a>

                <form th:action="@{/ui/transfer-requests/approve-batch}" method="post"
                      onsubmit="return confirm('האם לאשר את כל ' + [[${entry.value.size()}]] + ' הפריטים בקבוצה זו?')">
                    <input type="hidden" name="ids" th:value="${#strings.listJoin(entry.value.![id], ',')}" />
                    <button class="btn btn-approve fw-bold px-4 shadow-sm" type="submit">
                        <i class="bi bi-check-all me-1"></i> אשר את כולם
                    </button>
                </form>
            </div>
        </div>

        <div class="table-responsive p-3">
            <table class="table table-dark table-hover align-middle mb-0 text-end">
                <thead>
                <tr class="small text-uppercase">
                    <th class="text-center">ID</th>
                    <th>מק"ט / קטלוג</th>
                    <th>מספר סיריאל</th>
                    <th>הערות</th>
                    <th>תאריך בקשה</th>
                    <th class="text-start">פעולה בודדת</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${entry.value}">
                    <td class="text-center text-muted" th:text="${r.id}">1</td>
                    <td class="fw-bold" th:text="${r.item != null and r.item.itemType != null ? r.item.itemType.catalogNumber : 'N/A'}">CAT</td>
                    <td>
                        <span class="badge bg-dark border border-info text-info px-3"
                              th:text="${r.item != null and r.item.serialNumber != null ? r.item.serialNumber : 'צבר (Bulk)'}">S/N</span>
                    </td>
                    <td class="small text-muted" th:text="${r.note != null ? r.note : '—'}">—</td>
                    <td class="small text-white-50" th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">Date</td>
                    <td class="text-start">
                        <div class="d-flex gap-2">
                            <form method="post" th:action="@{/ui/transfer-requests/{id}/approve(id=${r.id})}">
                                <button class="btn btn-sm btn-outline-success" type="submit">אשר</button>
                            </form>
                            <form method="post" th:action="@{/ui/transfer-requests/{id}/reject(id=${r.id})}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">דחה</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
