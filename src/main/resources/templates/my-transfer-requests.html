<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Transfer Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/dashboard.css}">
</head>

<body class="dashboard-page">
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4 text-white">
        <h2 class="fw-bold mb-0">Incoming Transfer Requests</h2>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/ui}">← Back</a>
        </div>
    </div>

    <div th:if="${#maps.isEmpty(groupedRequests)}" class="glass-card p-4 text-center text-white-50">
        <h4>No pending requests.</h4>
        <p>You have no equipment transfers waiting for approval.</p>
    </div>

    <div th:each="entry : ${groupedRequests}" class="glass-card p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-2">
            <div>
                <h4 class="text-white mb-0" th:text="${entry.key}">Item Name from Sender</h4>
                <small class="text-white-50" th:text="${entry.value.size() + ' items in this batch'}">6 items</small>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-info" onclick="alert('PDF Grouping feature is being updated')">
                    Download Group PDF
                </button>
                <button class="btn btn-sm btn-success">Approve All</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>Request ID</th>
                    <th>Catalog Number</th>
                    <th>Serial Number</th>
                    <th>Note</th>
                    <th>Created At</th>
                    <th class="text-end">Individual Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${entry.value}">
                    <td th:text="${r.id}">1</td>
                    <td th:text="${r.item != null and r.item.itemType != null ? r.item.itemType.catalogNumber : 'N/A'}">CAT-123</td>
                    <td th:text="${r.item != null and r.item.serialNumber != null ? r.item.serialNumber : 'Bulk'}">S/N</td>
                    <td th:text="${r.note != null ? r.note : '—'}">—</td>
                    <td th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">Date</td>
                    <td class="text-end">
                        <form class="d-inline" method="post" th:action="@{/ui/transfer-requests/{id}/approve(id=${r.id})}">
                            <button class="btn btn-sm btn-success" type="submit">Approve</button>
                        </form>
                        <form class="d-inline ms-1" method="post" th:action="@{/ui/transfer-requests/{id}/reject(id=${r.id})}">
                            <button class="btn btn-sm btn-danger" type="submit">Reject</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
