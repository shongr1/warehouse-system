<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Transfer Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/dashboard.css}">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }
        .batch-header {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px 10px 0 0;
        }
    </style>
</head>

<body class="dashboard-page bg-dark text-white">
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Incoming Transfer Requests</h2>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/ui}">← Back</a>
        </div>
    </div>

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${param.success}">Operation successful</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#maps.isEmpty(groupedRequests)}" class="glass-card p-5 text-center text-white-50">
        <h4 class="mb-2">No pending requests.</h4>
        <p>You have no equipment transfers waiting for approval.</p>
    </div>

    <div th:each="entry : ${groupedRequests}" class="glass-card mb-5 overflow-hidden">

        <div class="batch-header p-4 d-flex justify-content-between align-items-center border-bottom border-secondary">
            <div>
                <h4 class="text-info mb-0" th:text="${entry.key}">Item Name from Sender</h4>
                <span class="badge bg-primary mt-1" th:text="${entry.value.size() + ' items in this batch'}">0 items</span>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-info" onclick="alert('PDF Grouping feature is being updated')">
                    Download Group PDF
                </button>

                <form th:action="@{/ui/transfer-requests/approve-batch}" method="post"
                      onsubmit="return confirm('האם לאשר את כל ' + [[${entry.value.size()}]] + ' הפריטים בקבוצה זו?')">
                    <input type="hidden" name="ids" th:value="${#strings.listJoin(entry.value.![id], ',')}" />
                    <button class="btn btn-success fw-bold" type="submit">Approve All</button>
                </form>
            </div>
        </div>

        <div class="table-responsive p-3">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                <tr class="text-muted small">
                    <th>ID</th>
                    <th>Catalog</th>
                    <th>Serial Number</th>
                    <th>Note</th>
                    <th>Created At</th>
                    <th class="text-end">Individual Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${entry.value}">
                    <td th:text="${r.id}">1</td>
                    <td th:text="${r.item != null and r.item.itemType != null ? r.item.itemType.catalogNumber : 'N/A'}">CAT</td>
                    <td class="fw-bold text-info" th:text="${r.item != null and r.item.serialNumber != null ? r.item.serialNumber : 'Bulk'}">S/N</td>
                    <td class="small" th:text="${r.note != null ? r.note : '—'}">—</td>
                    <td class="small text-white-50" th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">Date</td>
                    <td class="text-end">
                        <div class="btn-group">
                            <form method="post" th:action="@{/ui/transfer-requests/{id}/approve(id=${r.id})}">
                                <button class="btn btn-sm btn-outline-success" type="submit">Approve</button>
                            </form>
                            <form class="ms-1" method="post" th:action="@{/ui/transfer-requests/{id}/reject(id=${r.id})}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Reject</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
